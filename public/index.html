<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#FDD835" />
<title>FixIt — On‑demand repairs at your door</title>
<meta name="description" content="Book verified technicians for bikes, ACs, plumbing, electrical & appliances. Live tracking. Rapido-style FixIt." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: {
      colors: {
        brand: "#FDD835", ink: "#0B0B0F", cream: "#FFFDF5",
        primary: "#0B0B0F", success: "#10B981", danger: "#EF4444",
      },
      fontFamily: { sans: ['Plus Jakarta Sans','ui-sans-serif','system-ui'], display: ['Sora','ui-sans-serif'] },
      boxShadow: { soft: "0 6px 24px -8px rgba(20,15,5,0.18)", pop: "0 12px 40px -12px rgba(20,15,5,0.28)" },
      borderRadius: { xl2: "1.25rem" },
      animation: { pulseRing: "pulseRing 1.6s ease-out infinite" },
      keyframes: { pulseRing: { "0%": { boxShadow: "0 0 0 0 rgba(253,216,53,.6)" }, "100%": { boxShadow: "0 0 0 22px rgba(253,216,53,0)" } } }
    } }
  };
</script>
<style>
  html,body{background:#FFFDF5;color:#0B0B0F;font-family:'Plus Jakarta Sans',sans-serif;}
  h1,h2,h3{font-family:'Sora',sans-serif;letter-spacing:-0.02em;}
  .tap{transition:transform .15s ease;} .tap:active{transform:scale(.97);}
  .card{background:#fff;border:1px solid #eee5c8;border-radius:1.25rem;box-shadow:0 6px 24px -8px rgba(20,15,5,.18);}
  .fade-in{animation:fi .35s ease both;} @keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .sheet{animation:sh .3s ease both;} @keyframes sh{from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1}}
</style>
</head>
<body class="pb-24">

<!-- Top bar -->
<header class="sticky top-0 z-40 border-b border-black/5 bg-cream/80 backdrop-blur">
  <div class="mx-auto flex max-w-6xl items-center gap-3 px-4 py-3">
    <a href="#/" class="flex items-center gap-2 tap">
      <span class="flex h-9 w-9 items-center justify-center rounded-xl bg-brand shadow-soft">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94z"/></svg>
      </span>
      <span class="font-display text-lg font-extrabold">FixIt</span>
    </a>
    <button class="flex flex-1 items-center gap-2 rounded-full border border-black/10 bg-white px-4 py-2 text-left text-sm text-slate-500 tap max-w-md">
      <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <span class="truncate"><b class="text-black">Home</b> · MG Road, Bengaluru</span>
    </button>
    <button class="relative flex h-10 w-10 items-center justify-center rounded-full border border-black/10 bg-white tap">
      <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a2 2 0 0 0 3.4 0"/></svg>
      <span class="absolute right-2 top-2 h-2 w-2 rounded-full bg-danger"></span>
    </button>
  </div>
</header>

<main id="app" class="mx-auto max-w-6xl px-4 pt-4"></main>

<!-- Bottom nav -->
<nav class="fixed inset-x-0 bottom-0 z-40 border-t border-black/5 bg-cream/95 backdrop-blur pb-[env(safe-area-inset-bottom)]">
  <ul class="mx-auto flex max-w-6xl justify-around">
    <li class="flex-1"><a data-nav href="#/" class="flex flex-col items-center gap-1 py-2.5 tap"><span class="pill flex h-9 w-14 items-center justify-center rounded-full bg-brand"><svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg></span><span class="text-[11px] font-bold">Home</span></a></li>
    <li class="flex-1"><a data-nav href="#/bookings" class="flex flex-col items-center gap-1 py-2.5 tap text-slate-500"><span class="flex h-9 w-14 items-center justify-center rounded-full"><svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></span><span class="text-[11px] font-semibold">Bookings</span></a></li>
    <li class="flex-1"><a data-nav href="#/offers" class="flex flex-col items-center gap-1 py-2.5 tap text-slate-500"><span class="flex h-9 w-14 items-center justify-center rounded-full"><svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.6 12.6l-8-8a2 2 0 0 0-1.4-.6H4v7.2c0 .5.2 1 .6 1.4l8 8a2 2 0 0 0 2.8 0l5.2-5.2a2 2 0 0 0 0-2.8z"/><circle cx="7.5" cy="7.5" r="1.5"/></svg></span><span class="text-[11px] font-semibold">Offers</span></a></li>
    <li class="flex-1"><a data-nav href="#/profile" class="flex flex-col items-center gap-1 py-2.5 tap text-slate-500"><span class="flex h-9 w-14 items-center justify-center rounded-full"><svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg></span><span class="text-[11px] font-semibold">Account</span></a></li>
  </ul>
</nav>

<script>
const SERVICES = [
  { slug:"bike", name:"Bike Repair", tag:"At-home two-wheeler service", color:"#FCE7C3", from:249, rating:4.8, eta:"20 min" },
  { slug:"ac", name:"AC Service", tag:"Cleaning, gas, installation", color:"#CFE7F5", from:399, rating:4.9, eta:"30 min" },
  { slug:"plumbing", name:"Plumbing", tag:"Leaks, taps, drainage", color:"#CFEFEA", from:199, rating:4.7, eta:"25 min" },
  { slug:"electrical", name:"Electrical", tag:"Wiring, switches, fans", color:"#FCEEB5", from:179, rating:4.8, eta:"25 min" },
  { slug:"appliance", name:"Appliance", tag:"Fridge, washing machine", color:"#D9EFD5", from:299, rating:4.7, eta:"40 min" },
  { slug:"carpentry", name:"Carpentry", tag:"Doors, furniture, hinges", color:"#FADFC1", from:249, rating:4.6, eta:"35 min" },
  { slug:"phone", name:"Phone Repair", tag:"Screen, battery, pickup", color:"#E2D7F5", from:499, rating:4.7, eta:"45 min" },
  { slug:"cleaning", name:"Deep Cleaning", tag:"Home & kitchen sparkle", color:"#DDEFCB", from:799, rating:4.9, eta:"60 min" },
];
const el = (h) => { const d = document.createElement('div'); d.innerHTML = h.trim(); return d.firstElementChild; };
const app = document.getElementById('app');

function Home(){
  app.innerHTML = `
  <section class="fade-in relative overflow-hidden rounded-3xl bg-brand p-6 shadow-pop">
    <p class="text-xs font-bold uppercase tracking-widest opacity-70">FixIt · Rapid Repairs</p>
    <h1 class="mt-2 text-3xl font-extrabold leading-tight sm:text-4xl">Book a pro.<br/>Track them live.</h1>
    <p class="mt-2 max-w-sm text-sm opacity-80">Verified technicians at your door in 30 minutes.</p>
    <div class="mt-5 flex items-center gap-2 rounded-full bg-white px-4 py-3 shadow-soft">
      <svg class="h-5 w-5 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input placeholder="Search services · e.g. AC gas refill" class="flex-1 bg-transparent text-sm outline-none placeholder:text-slate-400"/>
      <button class="rounded-full bg-primary px-4 py-1.5 text-xs font-bold text-brand tap">Go</button>
    </div>
    <div class="mt-4 flex flex-wrap gap-2 text-xs">
      <span class="inline-flex items-center gap-1 rounded-full bg-black/10 px-3 py-1 font-semibold">✓ Verified pros</span>
      <span class="inline-flex items-center gap-1 rounded-full bg-black/10 px-3 py-1 font-semibold">⏱ 30‑min ETA</span>
      <span class="inline-flex items-center gap-1 rounded-full bg-black/10 px-3 py-1 font-semibold">★ 4.9 rated</span>
    </div>
  </section>
  <section class="mt-8 fade-in">
    <div class="flex items-end justify-between"><h2 class="text-xl font-bold">What needs fixing?</h2><a href="#/offers" class="text-xs font-semibold text-slate-500">See offers →</a></div>
    <div id="grid" class="mt-4 grid grid-cols-2 gap-3 sm:grid-cols-3 md:grid-cols-4"></div>
  </section>`;
  const grid = document.getElementById('grid');
  SERVICES.forEach(s => {
    grid.appendChild(el(`
      <a href="#/book?service=${s.slug}" class="card tap flex h-full flex-col gap-3 p-4 hover:-translate-y-0.5 hover:shadow-pop">
        <span class="flex h-11 w-11 items-center justify-center rounded-xl" style="background:${s.color}">
          <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="12" cy="12" r="9"/></svg>
        </span>
        <div><p class="font-semibold leading-tight">${s.name}</p><p class="text-xs text-slate-500">${s.tag}</p></div>
        <div class="mt-auto flex items-center justify-between text-xs"><span class="font-semibold">From ₹${s.from}</span><span class="text-slate-500">★ ${s.rating}</span></div>
      </a>`));
  });
}

function Book(){
  const q = new URLSearchParams(location.hash.split('?')[1] || '');
  const slug = q.get('service') || 'bike';
  const s = SERVICES.find(x => x.slug === slug);
  app.innerHTML = `
  <div class="fade-in mx-auto max-w-2xl">
    <a href="#/" class="text-sm text-slate-500">← Back</a>
    <div class="mt-3 rounded-3xl p-5" style="background:${s.color}">
      <h1 class="text-2xl font-extrabold">${s.name}</h1>
      <p class="text-sm opacity-80">${s.tag}</p>
      <p class="mt-1 text-xs font-semibold">★ ${s.rating} · ⏱ ${s.eta} · 🛡 Warranty</p>
    </div>
    <div class="card mt-5 p-4">
      <label class="text-xs font-bold uppercase tracking-wider text-slate-500">Address</label>
      <textarea rows="3" class="mt-2 w-full rounded-2xl border border-black/10 bg-white p-3 outline-none">221B MG Road, Bengaluru, 560001</textarea>
    </div>
    <div class="card mt-3 p-4">
      <label class="text-xs font-bold uppercase tracking-wider text-slate-500">Slot</label>
      <div class="mt-2 flex flex-wrap gap-2">
        ${["Now (30 min)","In 1 hour","Today 5–6 PM","Tomorrow 10 AM"].map((t,i) => `<button class="rounded-full border px-3 py-1.5 text-sm tap ${i===0?'border-brand bg-brand':'border-black/10 bg-white'}">${t}</button>`).join('')}
      </div>
    </div>
    <div class="sticky bottom-24 mt-6 flex items-center justify-between rounded-2xl bg-primary p-3 text-brand shadow-pop">
      <div class="pl-3"><p class="text-xs opacity-70">Total</p><p class="text-lg font-bold">₹${s.from + 50}</p></div>
      <button onclick="location.hash='#/track'" class="rounded-full bg-brand px-6 py-3 text-sm font-bold text-primary tap">Confirm booking</button>
    </div>
  </div>`;
}

function Track(){
  app.innerHTML = `
  <div class="fade-in mx-auto max-w-2xl">
    <div class="relative h-[60vh] overflow-hidden rounded-3xl border border-black/10 bg-[#f6efe0]">
      <div id="gmap" class="h-full w-full"></div>
      <div class="pointer-events-none absolute inset-x-0 top-3 flex items-center justify-center">
        <span class="rounded-full bg-white px-4 py-2 text-xs font-bold shadow-soft"><span class="mr-2 inline-block h-2 w-2 rounded-full bg-success animate-pulse align-middle"></span>Technician on the way</span>
      </div>
    </div>
    <div class="card sheet mt-4 p-4">
      <div class="flex items-center justify-between">
        <div><p class="text-xs font-bold uppercase tracking-wider text-slate-500">ETA</p><p class="font-display text-3xl font-extrabold">18 min</p></div>
        <div class="text-right"><p class="text-xs text-slate-500">Booking</p><p class="font-mono text-sm font-bold">FX2K91</p></div>
      </div>
      <div class="mt-4 flex items-center gap-3 rounded-2xl border border-black/10 bg-white p-3">
        <div class="flex h-12 w-12 items-center justify-center rounded-full bg-brand font-bold">RK</div>
        <div class="flex-1"><p class="font-semibold leading-tight">Ramesh K.</p><p class="text-xs text-slate-500">Hero Splendor · KA 05 AB 1234</p></div>
        <a href="tel:+911800000000" class="flex h-11 w-11 items-center justify-center rounded-full bg-success text-white tap">📞</a>
        <button class="flex h-11 w-11 items-center justify-center rounded-full bg-primary text-brand tap">💬</button>
      </div>
      <div class="mt-3 grid grid-cols-3 gap-2">
        <button class="rounded-xl border border-black/10 bg-white p-2.5 text-xs font-semibold tap">Directions</button>
        <button class="rounded-xl border border-danger/40 bg-danger/10 p-2.5 text-xs font-bold text-danger tap">SOS</button>
        <button onclick="location.hash='#/bookings'" class="rounded-xl border border-black/10 bg-white p-2.5 text-xs font-semibold tap">Cancel</button>
      </div>
    </div>
  </div>`;
  loadMap();
}

function Bookings(){
  app.innerHTML = `<div class="fade-in mx-auto max-w-3xl"><h1 class="text-2xl font-extrabold">Your bookings</h1>
    <div class="card mt-4 flex items-center gap-3 p-4"><div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-brand">🛵</div>
      <div class="flex-1"><p class="font-semibold">Bike Repair · Basic Checkup</p><p class="text-xs text-slate-500">Assigned · FX2K91</p></div>
      <a href="#/track" class="rounded-full bg-primary px-3 py-1.5 text-xs font-bold text-brand tap">Track</a></div></div>`;
}
function Offers(){ app.innerHTML = `<div class="fade-in mx-auto max-w-3xl"><h1 class="text-2xl font-extrabold">Offers</h1>
  <div class="mt-4 grid gap-3 sm:grid-cols-2">
    <div class="card p-4"><p class="font-semibold">Flat 20% off first booking</p><p class="text-xs text-slate-500 mt-1">Code: <b class="font-mono">FIXIT20</b></p></div>
    <div class="card p-4"><p class="font-semibold">AC deep clean at ₹299</p><p class="text-xs text-slate-500 mt-1">Code: <b class="font-mono">AC299</b></p></div>
  </div></div>`; }
function Profile(){ app.innerHTML = `<div class="fade-in mx-auto max-w-2xl">
  <div class="card flex items-center gap-4 p-5"><div class="flex h-16 w-16 items-center justify-center rounded-full bg-brand text-2xl">👤</div>
    <div class="flex-1"><p class="font-display text-xl font-bold">Guest User</p><p class="text-sm text-slate-500">+91 98765 43210</p></div></div>
  <div class="card mt-5 overflow-hidden"><a class="flex items-center gap-3 border-b border-black/5 px-4 py-3.5 tap" href="#/">📍 Saved addresses</a>
    <a class="flex items-center gap-3 border-b border-black/5 px-4 py-3.5 tap" href="#/">💳 Payment methods</a>
    <a class="flex items-center gap-3 border-b border-black/5 px-4 py-3.5 tap" href="#/offers">🎁 Offers & referrals</a>
    <a class="flex items-center gap-3 border-b border-black/5 px-4 py-3.5 tap" href="#/">⚙️ Settings</a>
    <a class="flex items-center gap-3 px-4 py-3.5 tap" href="#/">❓ Help & support</a></div></div>`; }

// Google Maps loader (uses server-provided key)
function loadMap(){
  const key = window.__FIXIT_MAPS_KEY__;
  if (!key) { document.getElementById('gmap').innerHTML = '<div class="grid h-full place-items-center text-sm text-slate-500">Set GOOGLE_MAPS_BROWSER_KEY on the server to enable live map.</div>'; return; }
  if (window.google?.maps) return renderMap();
  window.__initMap = renderMap;
  const s = document.createElement('script');
  s.async = true; s.src = `https://maps.googleapis.com/maps/api/js?key=${key}&loading=async&callback=__initMap&libraries=geometry`;
  document.head.appendChild(s);
}
function renderMap(){
  const g = window.google;
  const origin = { lat: 12.9756, lng: 77.5813 }, dest = { lat: 12.9716, lng: 77.5946 };
  const map = new g.maps.Map(document.getElementById('gmap'), { center: origin, zoom: 14, disableDefaultUI: true, styles: [
    { elementType:'geometry', stylers:[{color:'#f6efe0'}] }, { featureType:'poi', stylers:[{visibility:'off'}] },
    { featureType:'road', elementType:'geometry', stylers:[{color:'#ffffff'}] },
    { featureType:'road.highway', elementType:'geometry', stylers:[{color:'#ffe58a'}] },
    { featureType:'water', elementType:'geometry', stylers:[{color:'#b6d8e0'}] }
  ]});
  const bounds = new g.maps.LatLngBounds(); bounds.extend(origin); bounds.extend(dest); map.fitBounds(bounds, 80);
  const path=[origin]; for(let i=1;i<24;i++){const t=i/24;path.push({lat:origin.lat+(dest.lat-origin.lat)*t+Math.sin(t*Math.PI)*.004,lng:origin.lng+(dest.lng-origin.lng)*t+Math.cos(t*Math.PI)*.003});} path.push(dest);
  new g.maps.Polyline({ path, map, strokeColor:'#0B0B0F', strokeOpacity:.15, strokeWeight:8 });
  new g.maps.Polyline({ path, map, strokeColor:'#FDD835', strokeOpacity:1, strokeWeight:5 });
  new g.maps.Marker({ position: dest, map, icon: { path: g.maps.SymbolPath.CIRCLE, scale:8, fillColor:'#0B0B0F', fillOpacity:1, strokeColor:'#FDD835', strokeWeight:3 } });
  const tech = new g.maps.Marker({ position: origin, map, icon: { path: g.maps.SymbolPath.CIRCLE, scale:9, fillColor:'#FDD835', fillOpacity:1, strokeColor:'#0B0B0F', strokeWeight:3 } });
  let i=0; setInterval(()=>{ i=(i+.5)%path.length; const idx=Math.floor(i), f=i-idx; const a=path[idx], b=path[Math.min(idx+1,path.length-1)]; tech.setPosition({lat:a.lat+(b.lat-a.lat)*f,lng:a.lng+(b.lng-a.lng)*f}); }, 140);
}

const routes = { '': Home, '/': Home, '/book': Book, '/track': Track, '/bookings': Bookings, '/offers': Offers, '/profile': Profile };
function route(){ const p = (location.hash.replace(/^#/,'').split('?')[0]) || '/'; (routes[p] || Home)(); document.querySelectorAll('[data-nav]').forEach(a=>{ const active = a.getAttribute('href') === '#'+p; a.querySelector('span:first-child').className = 'flex h-9 w-14 items-center justify-center rounded-full' + (active?' bg-brand':''); a.className = 'flex flex-col items-center gap-1 py-2.5 tap' + (active?'':' text-slate-500'); }); window.scrollTo(0,0); }
window.addEventListener('hashchange', route); route();
</script>
</body>
</html>
