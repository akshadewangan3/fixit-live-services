<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixIt Global Admin System</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; padding: 40px; }
        .admin-box { background: #1e293b; padding: 30px; max-width: 600px; margin: auto; border-radius: 10px; border: 1px solid #334155; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; }
        button { background: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <div class="admin-box">
        <h2>FixIt Private Admin Infrastructure</h2>
        <p>Enter your Master API Security Key to pull platform metrics:</p>
        <input type="password" id="apiKey" placeholder="Enter FIXIT_API_KEY">
        <button onclick="loadAdminDashboard()">Authenticate & Load System</button>
        <pre id="output" style="margin-top: 20px; color: #10b981; background: #0f172a; padding: 10px; border-radius: 5px; max-height: 200px; overflow: auto;"></pre>
    </div>
 <script>
        async function loadAdminDashboard() {
            const key = document.getElementById('apiKey').value;
            const res = await fetch('/api/v1/admin/dashboard', {
                headers: { 'x-api-key': key }
            });
            const data = await res.json();
            document.getElementById('output').innerText = JSON.stringify(data, null, 2);
        }
    </script>
</body>
</html>
